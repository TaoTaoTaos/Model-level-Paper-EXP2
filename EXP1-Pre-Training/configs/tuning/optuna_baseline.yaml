experiment:
  name: "optuna_baseline"
  description: "Optuna tuning for NeuralCDE pretraining."

optuna:
  study_name: "lakeice_ncde_baseline"
  direction: "minimize"
  n_trials: 10
  timeout: null
  metric: "val_rmse"
  retrain_best: false
  sampler_seed: 42
  search_space:
    window_days: [7, 14, 30]
    interpolation: ["hermite", "linear"]
    hidden_channels: [32, 64, 128]
    hidden_hidden_channels: [64, 128, 256]
    num_hidden_layers: [1, 2, 3]
    dropout: [0.0, 0.1, 0.2]
    batch_size: [32, 64, 128]
    use_adjoint: [true, false]
    method: ["dopri5", "rk4"]
    target_transform: ["none", "log1p"]
    learning_rate:
      low: 1.0e-4
      high: 3.0e-3
      log: true
    weight_decay:
      low: 1.0e-6
      high: 1.0e-3
      log: true
